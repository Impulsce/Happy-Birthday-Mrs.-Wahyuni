<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Celebration</title>
    <style>
        :root {
            --bg-primary: #0a0f1d;
            --gold-light: #f3e5ab;
            --gold-core: #d4af37;
            --gold-dark: #aa7c11;
            --text-light: #ffffff;
            --text-muted: #a0a5b5;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-primary);
            font-family: 'Cinzel', 'Didot', 'Bodoni MT', 'Times New Roman', serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            perspective: 1000px;
        }

        /* Ambient Motion Background */
        #ambient-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* Surprise Burst Canvas */
        #surprise-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
        }

        /* Card Container */
        .card-container {
            position: relative;
            z-index: 5;
            width: 90%;
            max-width: 450px;
            aspect-ratio: 3/4;
            background: linear-gradient(135deg, #111827 0%, #070a14 100%);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 4px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6), 
                        0 0 40px rgba(212, 175, 55, 0.05);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            text-align: center;
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .card-container:hover {
            border-color: rgba(212, 175, 55, 0.6);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.7), 
                        0 0 50px rgba(212, 175, 55, 0.15);
        }

        /* Typography */
        .title {
            color: var(--gold-light);
            font-size: 2rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 10px;
            font-weight: 300;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInPreset 1.2s forwards 0.5s;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.85rem;
            letter-spacing: 6px;
            text-transform: uppercase;
            margin-bottom: 50px;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInPreset 1.2s forwards 0.8s;
        }

        /* Geometric Accent Line */
        .accent-line {
            width: 40px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold-core), transparent);
            margin-bottom: 50px;
            opacity: 0;
            animation: fadeInPreset 1.2s forwards 0.6s;
        }

        /* The Letter Envelope / Button */
        .envelope-btn {
            position: relative;
            width: 80px;
            height: 55px;
            background-color: #1a2333;
            border: 1px solid var(--gold-core);
            border-radius: 2px;
            cursor: pointer;
            transition: all 0.4s ease;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInPreset 1.2s forwards 1.1s;
        }

        .envelope-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 0;
            border-left: 39px solid transparent;
            border-right: 39px solid transparent;
            border-top: 26px solid var(--gold-core);
            transition: transform 0.4s ease;
            transform-origin: top;
        }

        .envelope-btn:hover {
            background-color: #243047;
            transform: scale(1.05) translateY(-2px);
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.1);
        }

        .envelope-btn:hover::before {
            transform: rotateX(180deg) translateY(-1px);
        }

        /* Modal Pop-up */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5, 7, 14, 0.85);
            z-index: 20;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.6s ease;
            backdrop-filter: blur(8px);
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background: linear-gradient(135deg, #161f30 0%, #0d1424 100%);
            border: 1px solid var(--gold-core);
            padding: 40px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            border-radius: 4px;
            box-shadow: 0 30px 70px rgba(0,0,0,0.8);
            transform: scale(0.8) translateY(30px);
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .modal-overlay.active .modal-content {
            transform: scale(1) translateY(0);
        }

        .message-title {
            color: var(--gold-light);
            font-size: 1.5rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 25px;
        }

        .message-text {
            color: var(--text-light);
            font-family: 'Georgia', serif;
            font-size: 1rem;
            line-height: 1.8;
            margin-bottom: 30px;
            text-align: justify;
        }

        .close-btn {
            background: transparent;
            border: 1px solid var(--gold-dark);
            color: var(--gold-light);
            padding: 10px 25px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .close-btn:hover {
            background: var(--gold-core);
            color: var(--bg-primary);
            border-color: var(--gold-core);
        }

        @keyframes fadeInPreset {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

    <!-- Motion Background Elements -->
    <canvas id="ambient-canvas"></canvas>
    <canvas id="surprise-canvas"></canvas>

    <!-- Main Greeting Card -->
    <div class="card-container">
        <h1 class="title">Hello, Mrs. Yuni!</h1>
        <div class="accent-line"></div>
        <p class="subtitle">May Mrs. Yuni get blessed always for this birthday!</p>
        
        <!-- Letter Button -->
        <button class="envelope-btn" id="open-letter-btn" aria-label="Open message"></button>
    </div>

    <!-- Hidden Pop-up Message -->
    <div class="modal-overlay" id="message-modal">
        <div class="modal-content">
            <h2 class="message-title">Hawila's Message For Mrs. Yuni!</h2>
            <p class="message-text">
                May this birthday always bring good luck, a lucky fortune also, God Bless You Mrs. Yuni!
            </p>
            <button class="close-btn" id="close-letter-btn">Return</button>
        </div>
    </div>

    <script>
        // --- Canvas 1: Ambient Floating Particles ---
        const ambientCanvas = document.getElementById('ambient-canvas');
        const ctxAmbient = ambientCanvas.getContext('2d');
        let ambientParticles = [];

        // --- Canvas 2: Surprise Particle Burst ---
        const surpriseCanvas = document.getElementById('surprise-canvas');
        const ctxSurprise = surpriseCanvas.getContext('2d');
        let surpriseParticles = [];
        let animationFrameId;

        // Resize management
        function resizeCanvases() {
            ambientCanvas.width = window.innerWidth;
            ambientCanvas.height = window.innerHeight;
            surpriseCanvas.width = window.innerWidth;
            surpriseCanvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvases);
        resizeCanvases();

        // Particle Blueprint
        class Particle {
            constructor(x, y, isSurprise = false) {
                this.x = x;
                this.y = y;
                this.size = Math.random() * (isSurprise ? 3 : 1.5) + 0.5;
                
                if (isSurprise) {
                    // Fast explosive burst
                    const angle = Math.random() * Math.PI * 2;
                    const speed = Math.random() * 6 + 2;
                    this.vx = Math.cos(angle) * speed;
                    this.vy = Math.sin(angle) * speed;
                    this.alpha = 1;
                    this.decay = Math.random() * 0.015 + 0.005;
                } else {
                    // Slow drifting motion
                    this.vx = (Math.random() - 0.5) * 0.3;
                    this.vy = -Math.random() * 0.4 - 0.1;
                    this.alpha = Math.random() * 0.5 + 0.2;
                }
                
                // Pure gold palette colors
                const colors = ['#f3e5ab', '#d4af37', '#aa7c11', '#ffffff'];
                this.color = colors[Math.floor(Math.random() * colors.length)];
            }

            updateAmbient() {
                this.x += this.vx;
                this.y += this.vy;
                // Loop vertically
                if (this.y < -10) this.y = ambientCanvas.height + 10;
                if (this.x < -10) this.x = ambientCanvas.width + 10;
                if (this.x > ambientCanvas.width + 10) this.x = -10;
            }

            updateSurprise() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.04; // Gentle gravity effect on explosion
                this.alpha -= this.decay;
            }

            draw(ctx) {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                // Draw delicate diamond shapes for an elegant look
                ctx.moveTo(this.x, this.y - this.size);
                ctx.lineTo(this.x + this.size, this.y);
                ctx.lineTo(this.x, this.y + this.size);
                ctx.lineTo(this.x - this.size, this.y);
                ctx.closePath();
                ctx.fill();
                ctx.restore();
            }
        }

        // Initialize Ambient Background
        function initAmbient() {
            const count = Math.floor((window.innerWidth * window.innerHeight) / 15000);
            for (let i = 0; i < count; i++) {
                ambientParticles.push(new Particle(
                    Math.random() * ambientCanvas.width,
                    Math.random() * ambientCanvas.height,
                    false
                ));
            }
        }
        initAmbient();

        // Generate Surprise Explosive Attribute
        function triggerSurpriseBurst() {
            const originX = window.innerWidth / 2;
            const originY = window.innerHeight / 2;
            // Generate distinct bursts
            for (let i = 0; i < 120; i++) {
                surpriseParticles.push(new Particle(originX, originY, true));
            }
        }

        // Continuous Loop Animation Engine
        function animate() {
            // 1. Render Ambient Motion Background
            ctxAmbient.clearRect(0, 0, ambientCanvas.width, ambientCanvas.height);
            ambientParticles.forEach(p => {
                p.updateAmbient();
                p.draw(ctxAmbient);
            });

            // 2. Render Active Surprise Motion Attributes
            ctxSurprise.clearRect(0, 0, surpriseCanvas.width, surpriseCanvas.height);
            for (let i = surpriseParticles.length - 1; i >= 0; i--) {
                const p = surpriseParticles[i];
                p.updateSurprise();
                if (p.alpha <= 0) {
                    surpriseParticles.splice(i, 1);
                } else {
                    p.draw(ctxSurprise);
                }
            }

            animationFrameId = requestAnimationFrame(animate);
        }
        animate();

        // --- Interaction Rules ---
        const openBtn = document.getElementById('open-letter-btn');
        const closeBtn = document.getElementById('close-letter-btn');
        const modal = document.getElementById('message-modal');

        openBtn.addEventListener('click', () => {
            modal.classList.add('active');
            // Delay burst slightly to coordinate perfectly with the visual snap of the popup
            setTimeout(triggerSurpriseBurst, 150);
        });

        closeBtn.addEventListener('click', () => {
            modal.classList.remove('active');
        });

        // Close modal if clicking overlay background area
        modal.addEventListener('click', (e) => {
            if (e.target === modal) {
                modal.classList.remove('active');
            }
        });
    </script>
</body>
</html>
